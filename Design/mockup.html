<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinLover - Midnight Gold Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0E14;
            --primary-color: #F59E0B; /* Liquid Amber */
            --secondary-color: #8B5CF6; /* Technical Violet */
            --text-main: #F8FAFC;
            --text-muted: #64748B;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-highlight: rgba(245, 158, 11, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.8);
            --success-color: #10B981;
            --danger-color: #F43F5E;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: var(--bg-color);
            border-radius: 50px;
            border: 12px solid #1E293B;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5), inset 0 0 20px rgba(245, 158, 11, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .logo {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 20px;
            color: var(--primary-color);
            letter-spacing: -1px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 16px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .glass-card.wide {
            grid-column: span 2;
        }

        .glass-card.accent {
            border-color: var(--glass-border-highlight);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.1);
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            color: var(--text-main);
        }

        .value.small {
            font-size: 20px;
        }

        .sub-value {
            font-size: 12px;
            color: var(--success-color);
            font-weight: 600;
        }

        .account-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--primary-color);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 8px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
        }

        .category-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .category-item.active .category-icon {
            background: rgba(139, 92, 246, 0.2);
            color: var(--secondary-color);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        .nav-bar {
            position: absolute;
            bottom: 30px;
            left: 24px;
            right: 24px;
            height: 70px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .nav-item {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 18px;
        }

        .nav-item.active {
            color: var(--primary-color);
            background: rgba(245, 158, 11, 0.1);
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="glow"></div>
        <div class="header">
            <div class="logo">CoinLover</div>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: #1E293B; border: 1px solid var(--glass-border);"></div>
        </div>

        <div class="bento-grid">
            <div class="glass-card wide accent">
                <div class="label">Total Balance</div>
                <div class="value">$12,450.80</div>
                <div class="sub-value">↑ 12% from last month</div>
            </div>

            <div class="glass-card">
                <div class="label">Income</div>
                <div class="value small">$4,200</div>
            </div>

            <div class="glass-card">
                <div class="label">Expenses</div>
                <div class="value small" style="color: var(--danger-color)">$1,850</div>
            </div>

            <div class="glass-card wide" style="padding: 10px;">
                <div class="account-item">
                    <div class="icon-box">🏦</div>
                    <div style="flex: 1">
                        <div class="label" style="font-size: 8px;">Chase Checking</div>
                        <div style="font-weight: 700; font-size: 14px;">$8,240.00</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <div class="label" style="margin-bottom: 12px; padding-left: 4px;">Categories</div>
            <div class="category-grid">
                <div class="category-item active">
                    <div class="category-icon">🍔</div>
                    <div class="label" style="font-size: 8px;">Food</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🚗</div>
                    <div class="label" style="font-size: 8px;">Transport</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🎬</div>
                    <div class="label" style="font-size: 8px;">Entertain</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">🛍️</div>
                    <div class="label" style="font-size: 8px;">Shop</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">💊</div>
                    <div class="label" style="font-size: 8px;">Health</div>
                </div>
                <div class="category-item">
                    <div class="category-icon">💡</div>
                    <div class="label" style="font-size: 8px;">Bills</div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📊</div>
            <div class="nav-item">📅</div>
            <div class="nav-item">⚙️</div>
        </div>
    </div>
</body>
</html>
